<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="%VITE_PWA_THEME_COLOR%" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" href="%VITE_FAVICON_PATH%" />
  <link rel="apple-touch-icon" sizes="180x180" href="%VITE_FAVICON_PATH%" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <title>%VITE_APP_NAME%</title>
  <meta name="description" content="%VITE_APP_DESCRIPTION%" />
  <meta name="keywords" content="%VITE_APP_KEYWORDS%" />
  <meta name="author" content="%VITE_APP_AUTHOR%" />
  <style>
    @keyframes fallback-spinner {
      to { transform: rotate(360deg); }
    }
    #fallback-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 0, 0, 0.12);
      border-top-color: #1976d2;
      border-radius: 50%;
      animation: fallback-spinner 0.8s linear infinite;
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Fallback UI -->
    <div id="fallback-ui" style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Public Sans', sans-serif;">
      <div style="text-align: center;">
        <div id="fallback-spinner" style="margin: 0 auto 20px;"></div>
        <p>Loading, please wait...</p>
      </div>
    </div>
  </div>

  <script>
    // Hide the fallback UI once the JS bundle has loaded
    window.addEventListener('DOMContentLoaded', () => {
      const el = document.getElementById('fallback-ui');
      if (el) el.style.display = 'none';
    });
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
